<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Voter Verification</h1>
    <div class="container p-3 mb-3 mt-5 rounded">
    <input type="number" class="form-control" id="age" min="10" max="120" placeholder="Enter your age here"><br>
    <button type="button" class="btn btn-primary mt-3" onclick="VerifyVotingEligibility()">Check Eligibility</button>
    <p id="status" class="mt-3">Status will be displayed here.</p>
    <hr>
    <label for="grade">Verify Average</label>
    <input type ="number" class="form-control" id="grade" placeholder="Enter Grade"><br>
    <button type="button" class="btn btn-primary mt-3" onclick="checkGrade()">Check Average</button>

    </div>

    <script src="main.js"></script>
</body>
</html>
